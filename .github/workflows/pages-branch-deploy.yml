name: Deploy GitHub Pages branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  PAGES_BRANCH: pages
  PUBLISH_DIR: .

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish static site to pages branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          pages_dir="${RUNNER_TEMP}/pages-branch"

          if git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PAGES_BRANCH}:${PAGES_BRANCH}"
            git worktree add "${pages_dir}" "${PAGES_BRANCH}"
            find "${pages_dir}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          else
            git worktree add --detach "${pages_dir}"
            git -C "${pages_dir}" checkout --orphan "${PAGES_BRANCH}"
            find "${pages_dir}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.DS_Store' \
            "${PUBLISH_DIR}/" "${pages_dir}/"

          touch "${pages_dir}/.nojekyll"

          deploy_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          mkdir -p "${pages_dir}/status"

          cat > "${pages_dir}/status/index.json" <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "source_branch": "${GITHUB_REF_NAME}",
            "source_commit": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "deployed_at_utc": "${deploy_time}"
          }
          EOF

          cat > "${pages_dir}/status/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>CoinVault Deployment Status</title>
            <style>
              body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
              code { background: #f4f4f4; padding: 0.1rem 0.3rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <h1>CoinVault Deployment Status</h1>
            <p><strong>Repository:</strong> <code>${GITHUB_REPOSITORY}</code></p>
            <p><strong>Source branch:</strong> <code>${GITHUB_REF_NAME}</code></p>
            <p><strong>Source commit:</strong> <code>${GITHUB_SHA}</code></p>
            <p><strong>Workflow:</strong> <code>${GITHUB_WORKFLOW}</code></p>
            <p><strong>Run ID:</strong> <code>${GITHUB_RUN_ID}</code></p>
            <p><strong>Run number:</strong> <code>${GITHUB_RUN_NUMBER}</code></p>
            <p><strong>Deployed at (UTC):</strong> <code>${deploy_time}</code></p>
            <p>Machine-readable status: <a href="./index.json">status/index.json</a></p>
          </body>
          </html>
          EOF

          git -C "${pages_dir}" add -A

          if git -C "${pages_dir}" diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git -C "${pages_dir}" commit -m "Deploy GitHub Pages"
          git -C "${pages_dir}" push origin "HEAD:${PAGES_BRANCH}" --force

      - name: Configure Pages branch
        run: |
          echo "Set GitHub Pages to deploy from the '${PAGES_BRANCH}' branch in the repository settings."
